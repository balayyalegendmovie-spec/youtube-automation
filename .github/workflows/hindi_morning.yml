name: 🇮🇳 Hindi Morning Upload

on:
  schedule:
    - cron: '0 3 * * *'     # 08:30 IST daily
  workflow_dispatch:

jobs:
  create-and-upload:
    name: 🎬 Hindi Content Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium
          mkdir -p output/logs output/debug assets/music assets/fonts
      
      - name: 🎵 Setup assets
        run: |
          wget -q -O assets/fonts/NotoSansDevanagari-Bold.ttf \
            "https://github.com/google/fonts/raw/main/ofl/notosansdevanagari/NotoSansDevanagari%5Bwdth%2Cwght%5D.ttf" \
            || echo "Font download failed — using system fonts"
      
      - name: 🚀 Run Hindi Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          HINDI_COOKIES: ${{ secrets.HINDI_COOKIES }}
        run: python main.py --language hindi
      
      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hindi-morning-logs-${{ github.run_number }}
          path: output/logs/
          retention-days: 7
