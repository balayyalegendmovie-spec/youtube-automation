name: 🇮🇳 Hindi Evening Upload

on:
  schedule:
    - cron: '0 10 * * *'    # 15:30 IST daily
  workflow_dispatch:

jobs:
  create-and-upload:
    name: 🎬 Hindi Content Pipeline (Evening)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-noto
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium
          mkdir -p output/logs output/debug assets/music assets/fonts
      
      - name: 🚀 Run Hindi Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          HINDI_COOKIES: ${{ secrets.HINDI_COOKIES }}
        run: python main.py --language hindi
      
      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hindi-evening-logs-${{ github.run_number }}
          path: output/logs/
          retention-days: 7
