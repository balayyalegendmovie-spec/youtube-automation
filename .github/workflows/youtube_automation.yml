name: YouTube Automation

on:
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 11 * * *'
  workflow_dispatch:
    inputs:
      language:
        description: 'Language'
        required: true
        default: 'telugu'
        type: choice
        options:
          - all
          - telugu
          - hindi

concurrency:
  group: youtube-automation
  cancel-in-progress: false

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq 2>/dev/null
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ffmpeg libgl1 2>/dev/null || {
            echo "First attempt failed, retrying..."
            sudo apt-get install -y ffmpeg 2>/dev/null || true
          }
          which ffmpeg && echo "FFmpeg installed" || echo "FFmpeg missing"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium || true

      - name: Create directories
        run: |
          mkdir -p config/cookies
          mkdir -p assets/fonts assets/music
          mkdir -p output/logs/screenshots

      - name: Setup credentials
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELUGU_COOKIES: ${{ secrets.TELUGU_COOKIES }}
          HINDI_COOKIES: ${{ secrets.HINDI_COOKIES }}
        run: |
          if [ -n "$TELUGU_COOKIES" ]; then
            echo "$TELUGU_COOKIES" > config/cookies/telugu_channel.json
            echo "Telugu cookies: $(wc -c < config/cookies/telugu_channel.json) bytes"
          else
            echo '{"cookies":[]}' > config/cookies/telugu_channel.json
            echo "WARNING: No Telugu cookies"
          fi

          if [ -n "$HINDI_COOKIES" ]; then
            echo "$HINDI_COOKIES" > config/cookies/hindi_channel.json
            echo "Hindi cookies: $(wc -c < config/cookies/hindi_channel.json) bytes"
          else
            echo '{"cookies":[]}' > config/cookies/hindi_channel.json
          fi

          python3 << 'PYEOF'
          import yaml, os
          with open('config/config.yaml', 'r') as f:
              config = yaml.safe_load(f)
          config['gemini']['api_key'] = os.environ.get('GEMINI_API_KEY', '')
          config['footage']['pexels_api_key'] = os.environ.get('PEXELS_API_KEY', '')
          with open('config/config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True)
          gk = os.environ.get('GEMINI_API_KEY', '')
          pk = os.environ.get('PEXELS_API_KEY', '')
          print(f"Gemini: {'SET' if gk else 'MISSING'}")
          print(f"Pexels: {'SET' if pk else 'MISSING'}")
          PYEOF

      - name: Download fonts
        run: |
          cd assets/fonts
          if [ ! -f "NotoSansTelugu-Bold.ttf" ]; then
            wget -q "https://github.com/google/fonts/raw/main/ofl/notosanstelugu/NotoSansTelugu%5Bwdth%2Cwght%5D.ttf" -O NotoSansTelugu-Bold.ttf 2>/dev/null || true
          fi
          if [ ! -f "NotoSansDevanagari-Bold.ttf" ]; then
            wget -q "https://github.com/google/fonts/raw/main/ofl/notosansdevanagari/NotoSansDevanagari%5Bwdth%2Cwght%5D.ttf" -O NotoSansDevanagari-Bold.ttf 2>/dev/null || true
          fi
          ls -la

      - name: Create background music
        run: |
          cd assets/music
          if [ ! -f "bg_ambient.mp3" ]; then
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 120 -b:a 128k -f mp3 bg_ambient.mp3 2>/dev/null || true
          fi
          ls -la

      - name: Verify setup
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          echo "========================================="
          echo "  SETUP VERIFICATION"
          echo "========================================="
          python3 << 'PYEOF'
          import sys, os
          print(f"Python: {sys.version}")
          print()
          packages = ['google.generativeai','edge_tts','moviepy','PIL','cv2',
                      'playwright','yaml','requests','bs4','numpy','scipy','pydub']
          print("Python packages:")
          for p in packages:
              try:
                  __import__(p)
                  print(f"  OK   {p}")
              except:
                  print(f"  FAIL {p}")
                  sys.exit(1)
          print()
          print("Source files:")
          for f in ['src/__init__.py','src/gemini_brain.py','src/trend_finder.py',
                    'src/breathing.py','src/voice_maker.py','src/video_animator.py',
                    'src/shorts_cutter.py','src/thumbnail_maker.py','src/uploader.py',
                    'src/drive_uploader.py','main.py','config/config.yaml']:
              size = os.path.getsize(f) if os.path.exists(f) else 0
              status = f"OK ({size} bytes)" if size > 0 else "MISSING"
              print(f"  {status:<25} {f}")
              if size == 0:
                  print(f"  WARNING: {f} is missing or empty!")
          print()
          print("Cookie files:")
          for ch in ['telugu', 'hindi']:
              cf = f"config/cookies/{ch}_channel.json"
              if os.path.exists(cf):
                  size = os.path.getsize(cf)
                  print(f"  OK ({size} bytes)  {cf}")
              else:
                  print(f"  MISSING          {cf}")
          print()
          gk = os.environ.get('GEMINI_API_KEY', '')
          pk = os.environ.get('PEXELS_API_KEY', '')
          print(f"GEMINI_API_KEY: {'SET' if gk else 'NOT SET'}")
          print(f"PEXELS_API_KEY: {'SET' if pk else 'NOT SET'}")
          print()
          print("ALL CHECKS PASSED")
          PYEOF

      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS: 'true'
        run: |
          LANGUAGE="${{ github.event.inputs.language || 'telugu' }}"

          echo "========================================="
          echo "  STARTING PIPELINE"
          echo "  Language: $LANGUAGE"
          echo "  Time: $(date)"
          echo "========================================="

          python main.py --language "$LANGUAGE"

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: warn
