name: YouTube Automation

on:
  schedule:
    - cron: '30 3 * * *'
    - cron: '30 11 * * *'
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to process'
        required: true
        default: 'telugu'
        type: choice
        options:
          - all
          - telugu
          - hindi

concurrency:
  group: youtube-automation
  cancel-in-progress: false

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          echo "Updating package lists..."
          sudo apt-get update -y || true

          echo "Installing ffmpeg and OpenGL..."
          sudo apt-get install -y ffmpeg || {
            echo "ffmpeg install failed, trying alternative..."
            sudo apt-get install -y --fix-broken
            sudo apt-get install -y ffmpeg
          }

          sudo apt-get install -y libgl1 || true
          sudo apt-get install -y libglib2.0-0 || true

          echo ""
          echo "Verifying ffmpeg..."
          which ffmpeg && ffmpeg -version | head -1 || echo "WARNING: ffmpeg not found"
          echo "System dependencies done"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "All Python packages installed"

      - name: Install Playwright
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium || true
          echo "Playwright ready"

      - name: Create directories
        run: |
          mkdir -p config/cookies
          mkdir -p assets/fonts assets/music assets/sounds assets/overlays
          mkdir -p output/logs/screenshots
          echo "Directories created"

      - name: Setup API keys and cookies
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TELUGU_COOKIES: ${{ secrets.TELUGU_COOKIES }}
          HINDI_COOKIES: ${{ secrets.HINDI_COOKIES }}
        run: |
          echo "Setting up credentials..."

          if [ -n "$TELUGU_COOKIES" ]; then
            echo "$TELUGU_COOKIES" > config/cookies/telugu_channel.json
            TSIZE=$(wc -c < config/cookies/telugu_channel.json)
            echo "Telugu cookies: ${TSIZE} bytes"
          else
            echo "WARNING: TELUGU_COOKIES secret is empty"
            echo '{"cookies":[],"channel_name":"telugu"}' > config/cookies/telugu_channel.json
          fi

          if [ -n "$HINDI_COOKIES" ]; then
            echo "$HINDI_COOKIES" > config/cookies/hindi_channel.json
            HSIZE=$(wc -c < config/cookies/hindi_channel.json)
            echo "Hindi cookies: ${HSIZE} bytes"
          else
            echo "WARNING: HINDI_COOKIES secret is empty"
            echo '{"cookies":[],"channel_name":"hindi"}' > config/cookies/hindi_channel.json
          fi

          python3 << 'PYEOF'
          import yaml
          import os

          config_path = "config/config.yaml"
          if not os.path.exists(config_path):
              print(f"ERROR: {config_path} not found")
              exit(1)

          with open(config_path, 'r') as f:
              config = yaml.safe_load(f)

          gemini_key = os.environ.get('GEMINI_API_KEY', '')
          pexels_key = os.environ.get('PEXELS_API_KEY', '')

          config['gemini']['api_key'] = gemini_key
          config['footage']['pexels_api_key'] = pexels_key

          with open(config_path, 'w') as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True)

          print(f"Gemini API key: {'SET (' + str(len(gemini_key)) + ' chars)' if gemini_key else 'MISSING'}")
          print(f"Pexels API key: {'SET (' + str(len(pexels_key)) + ' chars)' if pexels_key else 'MISSING'}")
          PYEOF

      - name: Download fonts
        run: |
          cd assets/fonts

          if [ ! -f "NotoSansTelugu-Bold.ttf" ]; then
            wget -q "https://github.com/google/fonts/raw/main/ofl/notosanstelugu/NotoSansTelugu%5Bwdth%2Cwght%5D.ttf" \
              -O NotoSansTelugu-Bold.ttf 2>/dev/null && echo "Telugu font downloaded" || echo "Telugu font failed"
          else
            echo "Telugu font exists"
          fi

          if [ ! -f "NotoSansDevanagari-Bold.ttf" ]; then
            wget -q "https://github.com/google/fonts/raw/main/ofl/notosansdevanagari/NotoSansDevanagari%5Bwdth%2Cwght%5D.ttf" \
              -O NotoSansDevanagari-Bold.ttf 2>/dev/null && echo "Hindi font downloaded" || echo "Hindi font failed"
          else
            echo "Hindi font exists"
          fi

          ls -la

      - name: Download background music
        run: |
          cd assets/music
          if [ ! -f "bg_ambient.mp3" ]; then
            echo "Creating silent background track..."
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 120 -b:a 128k -f mp3 bg_ambient.mp3 2>/dev/null
            echo "Silent background track created"
          fi
          ls -la

      - name: Verify setup
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          echo "========================================="
          echo "  SETUP VERIFICATION"
          echo "========================================="

          python3 << 'PYEOF'
          import sys
          import os

          print(f"Python: {sys.version}")
          print()

          # Check packages
          packages = {
              'google.generativeai': 'Gemini AI',
              'edge_tts': 'Edge TTS',
              'moviepy': 'MoviePy',
              'PIL': 'Pillow',
              'cv2': 'OpenCV',
              'playwright': 'Playwright',
              'yaml': 'PyYAML',
              'requests': 'Requests',
              'bs4': 'BeautifulSoup',
              'numpy': 'NumPy',
              'scipy': 'SciPy',
              'pydub': 'PyDub',
          }

          print("Python packages:")
          all_ok = True
          for module, name in packages.items():
              try:
                  __import__(module)
                  print(f"  OK   {name}")
              except ImportError:
                  print(f"  FAIL {name}")
                  all_ok = False

          # Check source files
          print()
          print("Source files:")
          src_files = [
              'src/__init__.py',
              'src/gemini_brain.py',
              'src/trend_finder.py',
              'src/breathing.py',
              'src/voice_maker.py',
              'src/video_animator.py',
              'src/shorts_cutter.py',
              'src/thumbnail_maker.py',
              'src/uploader.py',
              'main.py',
              'config/config.yaml',
          ]
          for f in src_files:
              exists = os.path.exists(f)
              size = os.path.getsize(f) if exists else 0
              status = f"OK ({size} bytes)" if exists else "MISSING"
              print(f"  {status:<20} {f}")
              if not exists:
                  all_ok = False

          # Check cookies
          print()
          print("Cookie files:")
          for ch in ['telugu', 'hindi']:
              cf = f"config/cookies/{ch}_channel.json"
              if os.path.exists(cf):
                  size = os.path.getsize(cf)
                  print(f"  OK ({size} bytes)  {cf}")
              else:
                  print(f"  MISSING          {cf}")

          # Check API keys
          print()
          gk = os.environ.get('GEMINI_API_KEY', '')
          pk = os.environ.get('PEXELS_API_KEY', '')
          print(f"GEMINI_API_KEY: {'SET' if gk else 'NOT SET'}")
          print(f"PEXELS_API_KEY: {'SET' if pk else 'NOT SET'}")

          print()
          if all_ok:
              print("ALL CHECKS PASSED")
          else:
              print("SOME CHECKS FAILED - pipeline may have issues")
              sys.exit(1)
          PYEOF

      - name: Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_ACTIONS: 'true'
        run: |
          LANGUAGE="${{ github.event.inputs.language || 'telugu' }}"

          echo "========================================="
          echo "  STARTING PIPELINE"
          echo "  Language: $LANGUAGE"
          echo "  Time: $(date)"
          echo "========================================="

          python main.py --language "$LANGUAGE"

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: warn
