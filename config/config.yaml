gemini:
  api_key: "${GEMINI_API_KEY}"
  model: "gemini-2.0-flash-lite"
  max_retries: 3
  retry_delay: 10
  temperature: 0.85
  max_output_tokens: 8192

channels:
  telugu:
    enabled: true
    channel_name: "Telugu Science & Tech"
    language: "telugu"
    language_code: "te"
    voice_id: "te-IN-ShrutiNeural"
    voice_gender: "female"
    font_file: "assets/fonts/NotoSansTelugu-Bold.ttf"
    cookie_file: "config/cookies/telugu_channel.json"
    preferred_niches:
      - "technology and AI"
      - "space and science"
      - "amazing facts"
      - "Indian history and mythology"
      - "health and fitness"
    character:
      style: "female_anime_teacher"
      hair_color: [20, 20, 60]
      eye_color: [80, 40, 180]
      outfit_color: [180, 40, 40]

  hindi:
    enabled: true
    channel_name: "Hindi Science & Tech"
    language: "hindi"
    language_code: "hi"
    voice_id: "hi-IN-SwaraNeural"
    voice_gender: "female"
    font_file: "assets/fonts/NotoSansDevanagari-Bold.ttf"
    cookie_file: "config/cookies/hindi_channel.json"
    preferred_niches:
      - "technology and AI"
      - "space and science"
      - "amazing facts"
      - "personal finance India"
      - "government schemes"
    character:
      style: "male_anime_presenter"
      hair_color: [20, 20, 20]
      eye_color: [50, 100, 200]
      outfit_color: [50, 50, 150]

content:
  long_form:
    target_words: 2000
    min_words: 1500
    max_words: 2500
    resolution_w: 1920
    resolution_h: 1080
    fps: 24
    bitrate: "4000k"

  shorts:
    max_duration_seconds: 58
    min_duration_seconds: 15
    resolution_w: 1080
    resolution_h: 1920
    fps: 24
    bitrate: "3000k"
    shorts_per_long_video: 5

  animation:
    style: "anime"
    bg_change_interval: 5
    character_blink_interval: 4
    mouth_sync: true

footage:
  pexels_api_key: "${PEXELS_API_KEY}"
  clips_per_video: 15
  preferred_quality: "hd"
  cache_clips: true

voice:
  breathing:
    enabled: true
    short_breath_ms: 250
    long_breath_ms: 500
    sentence_pause_ms: 350
    comma_pause_ms: 180

output:
  base_dir: "output"
  log_dir: "output/logs"
  keep_temp_files: false
